---
namespace: app\tests
bootstrap: _bootstrap.php
support_namespace: support
paths:
  tests: tests
  output: tests/support/output
  data: tests/support/data
  support: tests/support
  envs: tests/support/envs
actor_suffix: Tester
settings:
  memory_limit: 1024M
  colors: true
modules:
  config:
    Yii2:
      configFile: config/test.php
      entryUrl: http://localhost:8080/index-test.php
extensions:
  enabled:
    - Codeception\Extension\RunFailed
coverage:
  enabled: true
  include:
    - /src/*
